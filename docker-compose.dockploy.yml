services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mecaniaos-app
    command:
      - sh
      - -lc
      - pnpm db:push && pnpm start:prod
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET_SELF_INSPECTIONS: ${SUPABASE_STORAGE_BUCKET_SELF_INSPECTIONS}
      SUPABASE_STORAGE_BUCKET_WORK_ORDERS: ${SUPABASE_STORAGE_BUCKET_WORK_ORDERS}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_LIQUIDATOR_NAME: ${BOOTSTRAP_LIQUIDATOR_NAME:-}
      BOOTSTRAP_LIQUIDATOR_EMAIL: ${BOOTSTRAP_LIQUIDATOR_EMAIL:-}
      BOOTSTRAP_LIQUIDATOR_PASSWORD: ${BOOTSTRAP_LIQUIDATOR_PASSWORD:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
