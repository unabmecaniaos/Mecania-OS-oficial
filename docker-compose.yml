services:
  db:
    image: postgres:16-alpine
    container_name: mecaniaos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mecaniaos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - mecaniaos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mecaniaos"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Local development must stay isolated from deploy credentials.
  # These values intentionally do not read DATABASE_URL/SUPABASE_* from .env.
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: mecaniaos-app-dev
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PNPM_HOME: /pnpm
      PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      DATABASE_URL: ${LOCAL_DATABASE_URL:-postgresql://postgres:postgres@db:5432/mecaniaos?schema=public}
      DIRECT_URL: ${LOCAL_DIRECT_URL:-postgresql://postgres:postgres@db:5432/mecaniaos?schema=public}
      SESSION_SECRET: ${LOCAL_SESSION_SECRET:-replace-this-with-a-long-random-secret-1234567890}
      APP_URL: ${LOCAL_APP_URL:-http://localhost:3000}
      SUPABASE_URL: ${LOCAL_SUPABASE_URL:-https://example.supabase.co}
      SUPABASE_SERVICE_ROLE_KEY: ${LOCAL_SUPABASE_SERVICE_ROLE_KEY:-local-dev-service-role-key}
      SUPABASE_STORAGE_BUCKET_SELF_INSPECTIONS: ${LOCAL_SUPABASE_STORAGE_BUCKET_SELF_INSPECTIONS:-self-inspections-dev}
      SUPABASE_STORAGE_BUCKET_WORK_ORDERS: ${LOCAL_SUPABASE_STORAGE_BUCKET_WORK_ORDERS:-work-orders-dev}
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - mecaniaos_node_modules:/app/node_modules
      - /app/.next
    command: >
      sh -lc "
      mkdir -p .next &&
      find .next -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true &&
      pnpm prisma generate &&
      pnpm db:push &&
      pnpm db:seed:if-empty &&
      pnpm dev --hostname 0.0.0.0 --port 3000
      "
    restart: unless-stopped

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mecaniaos-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${LOCAL_DATABASE_URL:-postgresql://postgres:postgres@db:5432/mecaniaos?schema=public}
      DIRECT_URL: ${LOCAL_DIRECT_URL:-postgresql://postgres:postgres@db:5432/mecaniaos?schema=public}
      SESSION_SECRET: ${LOCAL_SESSION_SECRET:-replace-this-with-a-long-random-secret-1234567890}
      APP_URL: ${LOCAL_APP_URL:-http://localhost:3000}
      SUPABASE_URL: ${LOCAL_SUPABASE_URL:-https://example.supabase.co}
      SUPABASE_SERVICE_ROLE_KEY: ${LOCAL_SUPABASE_SERVICE_ROLE_KEY:-local-dev-service-role-key}
      SUPABASE_STORAGE_BUCKET_SELF_INSPECTIONS: ${LOCAL_SUPABASE_STORAGE_BUCKET_SELF_INSPECTIONS:-self-inspections-dev}
      SUPABASE_STORAGE_BUCKET_WORK_ORDERS: ${LOCAL_SUPABASE_STORAGE_BUCKET_WORK_ORDERS:-work-orders-dev}
      BOOTSTRAP_ADMIN_NAME: ${LOCAL_BOOTSTRAP_ADMIN_NAME:-Administrador}
      BOOTSTRAP_ADMIN_EMAIL: ${LOCAL_BOOTSTRAP_ADMIN_EMAIL:-admin@mecaniaos.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${LOCAL_BOOTSTRAP_ADMIN_PASSWORD:-admin123456}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  mecaniaos_postgres_data:
  mecaniaos_node_modules:
